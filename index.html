<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yavru Kuş Web Sitesi Mock-up</title>
    <style>
        /* Temel Sayfa Stilleri */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f4f7f6; /* Açık pastel bir arka plan */
            color: #333;
        }

        /* Header (Üst Kısım) Stilleri */
        header {
            background-color: #fff; /* Beyaz header arka planı */
            padding: 20px 50px;
            display: flex; /* İçerikleri esnek kutu olarak yerleştir */
            justify-content: space-between; /* Soldaki logo ve sağdaki menü arasını aç */
            align-items: center; /* Dikey olarak ortala */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); /* Hafif bir gölge */
        }

        /* Logo ve Başlık Alanı */
        .logo-container {
            display: flex; /* İkon ve metni yan yana getir */
            align-items: center; /* Dikey olarak ortala */
            gap: 15px; /* İkon ve metin arasındaki boşluk */
        }

        .logo-container h1 {
            font-size: 2.2em;
            margin: 0;
            color: #2c3e50; /* Koyu lacivert tonu */
            font-weight: 700;
        }

        .logo-container img {
            height: 50px; /* İkon yüksekliği */
            width: auto;
        }

        /* Navigasyon Menüsü */
        nav ul {
            list-style: none; /* Liste işaretlerini kaldır */
            margin: 0;
            padding: 0;
            display: flex; /* Menü öğelerini yan yana getir */
            gap: 30px; /* Menü öğeleri arasındaki boşluk */
        }

        nav a {
            text-decoration: none; /* Link alt çizgisini kaldır */
            color: #34495e; /* Menü metin rengi */
            font-weight: 600;
            font-size: 1.1em;
            transition: color 0.3s ease; /* Renk geçiş efekti */
        }

        nav a:hover {
            color: #27ae60; /* Üzerine gelince sevimli bir yeşil tonu */
        }

        /* Hero (Ana Görsel) Bölümü Stili (Görseldeki banner) */
        .hero {
            position: relative;
            width: 100%;
            height: 400px;
            overflow: hidden;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Görseli kesmeden sığdır */
        }

        .hero-text {
            position: absolute;
            bottom: 30px;
            left: 50px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .hero-text h2 {
            font-size: 2.5em;
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- Header Bölümü -->
    <header>
        <div class="logo-container">
            <!-- Gerçek bir kuş ikonu dosyasının yolunu buraya yazın -->
            <img src="path/to/your/fledgling_bird_icon.png" alt="Yavru Kuş İkonu">
            <h1>Yavru Kuş</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#">Ana Sayfa</a></li>
                <li><a href="#">Galeri</a></li>
                <li><a href="#">Hakkımızda</a></li>
                <li><a href="#">İletişim</a></li>
            </ul>
        </nav>
    </header>

    <!-- Ana Görsel (Hero) Bölümü - Görseldeki banner -->
    <div class="hero">
        <img src="path/to/your/large_fledgling_photo.jpg" alt="Ana Görsel - Yavru Kuş">
        <div class="hero-text">
            <h2>Sevimli Kuşlar Dünyasına Hoş Geldiniz!</h2>
        </div>
    </div>

    <!-- Ana içerik buraya gelecek -->

</body>
</html>
